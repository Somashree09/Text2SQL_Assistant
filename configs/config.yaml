# Model
model_name: "Qwen/Qwen3-0.6B-Base"
max_length: 512

# Dataset
dataset_name: "b-mc2/sql-create-context"
test_size: 0.05
seed: 42
max_train_samples: 5000   # set to null to use the full training set

# LoRA
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  

# Training
output_dir: "./outputs/qwen3-sql-lora"
adapter_dir: "./outputs/qwen3-sql-lora-adapter"
per_device_train_batch_size: 8
gradient_accumulation_steps: 2
num_train_epochs: 1
learning_rate: 0.0002
logging_steps: 10
bf16: true
gradient_checkpointing: true

# Evaluation
num_eval_samples: 200
max_new_tokens: 100
rows_per_table: 5
